version: '3.8'

services:
  # --- DATABASE ---
  mongodb:
    image: mongo:latest
    container_name: moneytrack_db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-password123}
    volumes:
      - mongodb_data:/data/db
    networks:
      - moneytrack_network

  # --- PRODUCTION INSTANCE ---
  api_prod:
    build: .
    container_name: moneytrack_api_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI_PROD}
      - JWT_SECRET=${JWT_SECRET_PROD}
      - CORS_ORIGINS=${CORS_ORIGINS_PROD}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=https://trackfinances.net
    depends_on:
      - mongodb
    networks:
      - moneytrack_network

  # --- DEVELOPMENT INSTANCE ---
  api_dev:
    build: .
    container_name: moneytrack_api_dev
    restart: always
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI_DEV}
      - JWT_SECRET=${JWT_SECRET_DEV}
      - CORS_ORIGINS=${CORS_ORIGINS_DEV}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - moneytrack_network

networks:
  moneytrack_network:
    driver: bridge

volumes:
  mongodb_data: